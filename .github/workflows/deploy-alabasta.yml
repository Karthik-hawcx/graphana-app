name: Deploy to Alabasta

on:
  push:
    tags:
      - 'deploy_aws_alabasta_v*'

env:
  EKS_REGION: us-west-2
  EKS_CLUSTER_NAME: Alabasta
  AWS_ROLE_ARN: arn:aws:iam::975050144940:role/GitHubActionsRole

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.EKS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.EKS_REGION }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Apply raw manifests (ConfigMaps with Grafana template vars)
        run: |
          echo "Applying ConfigMaps..."
          kubectl apply -f manifests/ -n monitoring

      - name: Deploy to EKS
        run: |
          helm upgrade --install hawcx-monitoring ./chart \
            -f chart/values-alabasta.yaml \
            -n monitoring \
            --create-namespace \
            --timeout 300s

          echo "Verifying deployments..."
          kubectl rollout status deployment/prometheus -n monitoring --timeout=120s
          kubectl rollout status deployment/grafana -n monitoring --timeout=120s
