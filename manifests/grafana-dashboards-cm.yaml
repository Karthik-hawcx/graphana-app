apiVersion: v1
data:
  auth-flows.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "thresholds": { "steps": [{ "color": "green", "value": null }] }
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": { "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true, "minVizWidth": 16, "minVizHeight": 16, "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            {
              "expr": "sum(hx_auth_flow_started_total{flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}) by (flow_type)",
              "legendFormat": "started {{flow_type}}"
            },
            {
              "expr": "sum(hx_auth_flow_completed_total{outcome=\"completed\", flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}) by (flow_type)",
              "legendFormat": "completed {{flow_type}}"
            },
            {
              "expr": "sum(hx_auth_flow_completed_total{outcome=\"failed\", flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}) by (flow_type)",
              "legendFormat": "failed {{flow_type}}"
            },
            {
              "expr": "sum(hx_auth_flow_completed_total{outcome=\"blocked\", flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}) by (flow_type)",
              "legendFormat": "blocked {{flow_type}}"
            }
          ],
          "title": "Flow Funnel",
          "type": "bargauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "bars", "lineWidth": 1, "fillOpacity": 70, "stacking": { "mode": "normal" } }
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum"] } },
          "targets": [
            {
              "expr": "sum(rate(hx_auth_flow_completed_total{flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}[5m])) by (outcome)",
              "legendFormat": "{{outcome}}"
            }
          ],
          "title": "Flow Outcomes",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 20 },
          "id": 100,
          "title": "Failures",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "bars", "lineWidth": 1, "fillOpacity": 70, "stacking": { "mode": "normal" } }
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 21 },
          "id": 5,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum", "lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(increase(hx_auth_flow_failures_total{flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}[$__rate_interval])) by (error_code)",
              "legendFormat": "{{error_code}}"
            }
          ],
          "title": "Failures by Error Code",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "bars", "lineWidth": 1, "fillOpacity": 70, "stacking": { "mode": "normal" } }
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 21 },
          "id": 6,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum", "lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(increase(hx_auth_method_verification_failures_total{tenant_id=~\"$tenant_id\"}[$__rate_interval])) by (method, error_code)",
              "legendFormat": "{{method}} — {{error_code}}"
            }
          ],
          "title": "Method Verification Failures",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" }
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 31 },
          "id": 9,
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "pieType": "donut",
            "legend": { "displayMode": "table", "placement": "right", "calcs": ["lastNotNull", "percent"] }
          },
          "targets": [
            {
              "expr": "sum(hx_auth_flow_completed_total{flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}) by (outcome)",
              "legendFormat": "{{outcome}}"
            }
          ],
          "title": "Flow Outcomes (completed/failed/blocked)",
          "type": "piechart"
        }
      ],
      "schemaVersion": 39,
      "tags": ["auth", "flows"],
      "templating": {
        "list": [
          {
            "allValue": ".*",
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(hx_auth_flow_started_total, flow_type)",
            "includeAll": true,
            "multi": true,
            "name": "flow_type",
            "query": "label_values(hx_auth_flow_started_total, flow_type)",
            "refresh": 2,
            "sort": 1,
            "type": "query"
          },
          {
            "allValue": ".*",
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(hx_auth_flow_started_total, tenant_id)",
            "includeAll": true,
            "multi": true,
            "name": "tenant_id",
            "query": "label_values(hx_auth_flow_started_total, tenant_id)",
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Auth Flows",
      "uid": "auth-flows",
      "version": 2
    }
  infrastructure.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "Database",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true }
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 1 },
          "id": 1,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] } },
          "targets": [
            {
              "expr": "hx_auth_db_pool_checked_out{tenant_id=~\"$tenant_id\"}",
              "legendFormat": "checked_out {{tenant_id}}"
            },
            {
              "expr": "hx_auth_db_pool_overflow{tenant_id=~\"$tenant_id\"}",
              "legendFormat": "overflow {{tenant_id}}"
            },
            {
              "expr": "hx_auth_db_pool_size{tenant_id=~\"$tenant_id\"}",
              "legendFormat": "pool_size {{tenant_id}}"
            }
          ],
          "title": "DB Pool (hx-auth)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true }
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 1 },
          "id": 2,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] } },
          "targets": [
            {
              "expr": "hx_auth_pgbouncer_cl_active{database=~\"$database\"}",
              "legendFormat": "cl_active {{database}}"
            },
            {
              "expr": "hx_auth_pgbouncer_cl_waiting{database=~\"$database\"}",
              "legendFormat": "cl_waiting {{database}}"
            },
            {
              "expr": "hx_auth_pgbouncer_sv_active{database=~\"$database\"}",
              "legendFormat": "sv_active {{database}}"
            },
            {
              "expr": "hx_auth_pgbouncer_sv_idle{database=~\"$database\"}",
              "legendFormat": "sv_idle {{database}}"
            }
          ],
          "title": "PgBouncer Connections",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] },
              "mappings": [{ "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } }, "type": "value" }]
            }
          },
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 11 },
          "id": 3,
          "targets": [
            {
              "expr": "hx_auth_pgbouncer_metrics_up",
              "legendFormat": ""
            }
          ],
          "title": "PgBouncer Health",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true }
            }
          },
          "gridPos": { "h": 5, "w": 18, "x": 6, "y": 11 },
          "id": 7,
          "options": { "legend": { "displayMode": "list", "placement": "right" } },
          "targets": [
            {
              "expr": "tenant_db_engines_cached",
              "legendFormat": "engines cached"
            },
            {
              "expr": "rate(tenant_db_cache_hits_total[1m])",
              "legendFormat": "cache hits/s"
            },
            {
              "expr": "rate(tenant_db_cache_misses_total[1m])",
              "legendFormat": "cache misses/s"
            }
          ],
          "title": "DB Engine Cache (tenant-config)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 17 },
          "id": 101,
          "title": "Redis",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true },
              "unit": "ops"
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 18 },
          "id": 4,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] } },
          "targets": [
            {
              "expr": "rate(hx_auth_redis_operations_total[1m])",
              "legendFormat": "{{operation}}"
            }
          ],
          "title": "Redis Ops (hx-auth)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true },
              "unit": "ops"
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 18 },
          "id": 5,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] } },
          "targets": [
            {
              "expr": "rate(redis_operations_total[1m])",
              "legendFormat": "{{operation}} {{status}}"
            }
          ],
          "title": "Redis Ops (tenant-config)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 0 },
              "mappings": [{ "options": { "0": { "text": "CLOSED", "color": "green" }, "1": { "text": "OPEN", "color": "red" }, "2": { "text": "HALF-OPEN", "color": "yellow" } }, "type": "value" }]
            }
          },
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 28 },
          "id": 6,
          "targets": [
            {
              "expr": "redis_circuit_breaker_state",
              "legendFormat": "circuit breaker"
            }
          ],
          "title": "Redis Circuit Breaker",
          "type": "state-timeline"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 34 },
          "id": 102,
          "title": "Analytics",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "bars", "lineWidth": 1, "fillOpacity": 70, "stacking": { "mode": "normal" } }
            }
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 35 },
          "id": 8,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum", "lastNotNull"] } },
          "targets": [
            {
              "expr": "rate(hx_auth_analytics_batch_total[5m])",
              "legendFormat": "{{status}}"
            }
          ],
          "title": "Analytics Batch",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["infrastructure", "database", "redis"],
      "templating": {
        "list": [
          {
            "allValue": ".*",
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(hx_auth_db_pool_size, tenant_id)",
            "includeAll": true,
            "multi": true,
            "name": "tenant_id",
            "query": "label_values(hx_auth_db_pool_size, tenant_id)",
            "refresh": 2,
            "sort": 1,
            "type": "query"
          },
          {
            "allValue": ".*",
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(hx_auth_pgbouncer_cl_active, database)",
            "includeAll": true,
            "multi": true,
            "name": "database",
            "query": "label_values(hx_auth_pgbouncer_cl_active, database)",
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Infrastructure",
      "uid": "infrastructure",
      "version": 2
    }
  kong-auth-security.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 100,
          "title": "Overview",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.9
                  },
                  {
                    "color": "green",
                    "value": 0.98
                  }
                ]
              },
              "noValue": "N/A"
            }
          },
          "gridPos": {
            "h": 6,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "id": 1,
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "area"
          },
          "targets": [
            {
              "expr": "sum(rate(kong_http_requests_total{code=~\"2..\"}[5m])) / sum(rate(kong_http_requests_total[5m]))",
              "legendFormat": ""
            }
          ],
          "title": "Auth Success Rate",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "noValue": "0"
            }
          },
          "gridPos": {
            "h": 6,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "id": 2,
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "area"
          },
          "targets": [
            {
              "expr": "sum(rate(kong_http_requests_total[5m]))",
              "legendFormat": ""
            }
          ],
          "title": "Total Requests/sec",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 5
                  },
                  {
                    "color": "red",
                    "value": 20
                  }
                ]
              },
              "noValue": "0"
            }
          },
          "gridPos": {
            "h": 6,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "id": 3,
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "area"
          },
          "targets": [
            {
              "expr": "sum(rate(kong_http_requests_total{code=\"401\"}[1m])) * 60",
              "legendFormat": ""
            }
          ],
          "title": "401s/min",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 5
                  },
                  {
                    "color": "red",
                    "value": 20
                  }
                ]
              },
              "noValue": "0"
            }
          },
          "gridPos": {
            "h": 6,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "id": 4,
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "area"
          },
          "targets": [
            {
              "expr": "sum(rate(kong_http_requests_total{code=\"403\"}[1m])) * 60",
              "legendFormat": ""
            }
          ],
          "title": "403s/min",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 7
          },
          "id": 101,
          "title": "Auth Type Distribution (Loki)",
          "type": "row"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              }
            }
          },
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 5,
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "pieType": "donut",
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": [
                "lastNotNull",
                "percent"
              ]
            }
          },
          "targets": [
            {
              "expr": "sum by (auth_type) (count_over_time({job=\"kong\", route!=\"unknown\"} | auth_type != \"\" [$__range]))",
              "legendFormat": "{{auth_type}}",
              "refId": "A"
            }
          ],
          "title": "DPoP vs Bearer vs Missing",
          "type": "piechart"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "bars",
                "lineWidth": 1,
                "fillOpacity": 70,
                "stacking": {
                  "mode": "normal"
                }
              }
            }
          },
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 6,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "sum"
              ]
            }
          },
          "targets": [
            {
              "expr": "sum by (auth_type) (count_over_time({job=\"kong\", route!=\"unknown\"} | auth_type != \"\" [$__interval]))",
              "legendFormat": "{{auth_type}}",
              "refId": "A"
            }
          ],
          "title": "Auth Type Over Time",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 18
          },
          "id": 102,
          "title": "Route Breakdown",
          "type": "row"
        },
