          "type": "piechart"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "bars",
                "lineWidth": 1,
                "fillOpacity": 70,
                "stacking": {
                  "mode": "normal"
                }
              }
            }
          },
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 6,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "sum"
              ]
            }
          },
          "targets": [
            {
              "expr": "sum by (auth_type) (count_over_time({job=\"kong\"} | auth_type != \"\" [$__interval]))",
              "legendFormat": "{{auth_type}}",
              "refId": "A"
            }
          ],
          "title": "Auth Type Over Time",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 18
          },
          "id": 102,
          "title": "Route Breakdown",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 15,
                "pointSize": 1,
                "spanNulls": true
              },
              "unit": "reqps"
            }
          },
          "gridPos": {
            "h": 10,
            "w": 8,
            "x": 0,
            "y": 19
          },
          "id": 7,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "lastNotNull"
              ]
            }
          },
          "targets": [
