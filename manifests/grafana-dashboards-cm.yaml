          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum", "lastNotNull"] } },
          "targets": [
            {
              "expr": "rate(hx_auth_analytics_batch_total[5m])",
              "legendFormat": "{{status}}"
            }
          ],
          "title": "Analytics Batch",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["infrastructure", "database", "redis"],
      "templating": {
        "list": [
          {
            "allValue": ".*",
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(hx_auth_db_pool_size, tenant_id)",
            "includeAll": true,
            "multi": true,
            "name": "tenant_id",
            "query": "label_values(hx_auth_db_pool_size, tenant_id)",
            "refresh": 2,
            "sort": 1,
            "type": "query"
          },
          {
            "allValue": ".*",
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(hx_auth_pgbouncer_cl_active, database)",
            "includeAll": true,
            "multi": true,
            "name": "database",
            "query": "label_values(hx_auth_pgbouncer_cl_active, database)",
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Infrastructure",
      "uid": "infrastructure",
      "version": 2
    }
  kong-auth-security.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 100,
          "title": "Overview",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.9
                  },
                  {
                    "color": "green",
                    "value": 0.98
                  }
                ]
              },
              "noValue": "N/A"
            }
          },
          "gridPos": {
            "h": 6,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "id": 1,
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "area"
          },
          "targets": [
            {
              "expr": "sum(rate(kong_http_requests_total{code=~\"2..\"}[5m])) / sum(rate(kong_http_requests_total[5m]))",
              "legendFormat": ""
            }
          ],
          "title": "Auth Success Rate",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "noValue": "0"
            }
          },
          "gridPos": {
            "h": 6,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "id": 2,
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "area"
          },
          "targets": [
            {
              "expr": "sum(rate(kong_http_requests_total[5m]))",
              "legendFormat": ""
            }
          ],
          "title": "Total Requests/sec",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 5
                  },
                  {
                    "color": "red",
                    "value": 20
                  }
                ]
              },
              "noValue": "0"
            }
          },
          "gridPos": {
            "h": 6,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "id": 3,
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "area"
          },
          "targets": [
            {
              "expr": "sum(rate(kong_http_requests_total{code=\"401\"}[1m])) * 60",
