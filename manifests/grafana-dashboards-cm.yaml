              "expr": "hx_auth_db_pool_overflow{tenant_id=~\"$tenant_id\"}",
              "legendFormat": "overflow {{tenant_id}}"
            },
            {
              "expr": "hx_auth_db_pool_size{tenant_id=~\"$tenant_id\"}",
              "legendFormat": "pool_size {{tenant_id}}"
            }
