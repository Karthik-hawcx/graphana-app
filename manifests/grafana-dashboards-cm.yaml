          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 5
                  },
                  {
                    "color": "red",
                    "value": 20
                  }
                ]
              },
              "noValue": "0"
            }
          },
          "gridPos": {
            "h": 6,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "id": 4,
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background",
            "graphMode": "area"
          },
          "targets": [
            {
              "expr": "sum(rate(kong_http_requests_total{code=\"403\"}[1m])) * 60",
              "legendFormat": ""
