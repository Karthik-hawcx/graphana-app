apiVersion: v1
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-service:3100
        editable: false
        jsonData:
          derivedFields:
            - datasourceUid: loki
              matcherRegex: '"request_id":"(req_[a-f0-9]+)"'
              name: request_id
              url: ''
            - datasourceUid: loki
              matcherRegex: '"session_id":"(auth_[^"]+)"'
              name: session_id
              url: ''
  grafana.ini: |
    [server]
    root_url = http://localhost:13000/
    serve_from_sub_path = false

    [security]
    admin_user = admin
    admin_password = hawcx
    allow_embedding = true

    [auth.anonymous]
    enabled = true
    org_role = Editor

    [users]
    viewers_can_edit = true

    [dashboards]
    default_home_dashboard_path = /var/lib/grafana/dashboards/system-health.json
kind: ConfigMap
metadata:
  annotations:
    meta.helm.sh/release-name: hawcx-monitoring
    meta.helm.sh/release-namespace: monitoring
  labels:
    app: grafana
    app.kubernetes.io/managed-by: Helm
  name: grafana-config
  namespace: monitoring
