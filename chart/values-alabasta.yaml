# Alabasta EKS cluster overrides (us-west-2)
namespace: monitoring

prometheus:
  enabled: true
  scrapeTargets:
    - jobName: hx-auth
      metricsPath: /metrics
      scrapeInterval: 15s
      kubernetesSD:
        namespaces: ["hx-auth"]
        appLabel: hx-auth
    - jobName: hawcx-core-oauth
      metricsPath: /metrics
      scrapeInterval: 15s
      targets: ["hawcx-core-oauth-service.hawcx-core-oauth.svc.cluster.local:8080"]
    - jobName: hx-tenant-config
      metricsPath: /metrics
      scrapeInterval: 15s
      targets: ["hx-tenant-config-service.hx-tenant-config.svc.cluster.local:8000"]
    # Kong Gateway metrics — use pod SD since the service doesn't expose port 8100
    - jobName: kong-gateway
      metricsPath: /metrics
      scrapeInterval: 15s
      scrapePort: "8100"
      kubernetesSD:
        namespaces: ["kong"]
        appLabel: kong-dataplane

loki:
  enabled: true
  # IMPORTANT: Use emptyDir, NOT EFS — EFS caused write latency issues
  storage: emptyDir
  storageSizeLimit: 10Gi
  objectStore: s3
  s3Url: "s3://us-west-2/hawcx-alabasta-loki-logs"
  retentionPeriod: "2160h"  # 90 days — S3 lifecycle deletes at 95 days as backup
  serviceAccountRoleArn: "arn:aws:iam::975050144940:role/hawcx-alabasta-loki-s3-role"

grafana:
  enabled: true
  rootUrl: "https://grafana-alabasta.hawcx.com/"
  ingress:
    enabled: true
    host: "grafana-alabasta.hawcx.com"
    certificateArn: "arn:aws:acm:us-west-2:975050144940:certificate/483d993b-a8c5-4c1b-9358-c9963db1c8eb"
    loadBalancerName: "grafana-alabasta-alb"

vector:
  enabled: true
  image: "timberio/vector:0.41.1-alpine"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
