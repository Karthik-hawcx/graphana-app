{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: {{ include "hawcx-monitoring.namespace" . }}
  labels:
    app: grafana
    {{- include "hawcx-monitoring.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: false
      {{- if .Values.loki.enabled }}
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki-service:3100
        editable: false
        jsonData:
          derivedFields:
            - datasourceUid: loki
              matcherRegex: '"request_id":"(req_[a-f0-9]+)"'
              name: request_id
              url: ''
            - datasourceUid: loki
              matcherRegex: '"session_id":"(auth_[^"]+)"'
              name: session_id
              url: ''
      {{- end }}

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false

  grafana.ini: |
    [server]
    root_url = {{ .Values.grafana.rootUrl | default "http://localhost:13000/" }}
    serve_from_sub_path = false

    [security]
    admin_user = {{ .Values.grafana.adminUser | default "admin" }}
    admin_password = {{ .Values.grafana.adminPassword | default "hawcx" }}
    allow_embedding = {{ .Values.grafana.allowEmbedding | default true }}

    [auth.anonymous]
    enabled = {{ .Values.grafana.anonymousAuth | default true }}
    org_role = {{ .Values.grafana.anonymousOrgRole | default "Editor" }}

    [users]
    viewers_can_edit = {{ .Values.grafana.viewersCanEdit | default true }}

    [dashboards]
    default_home_dashboard_path = {{ .Values.grafana.defaultHomeDashboard | default "/var/lib/grafana/dashboards/system-health.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ include "hawcx-monitoring.namespace" . }}
  labels:
    app: grafana
    {{- include "hawcx-monitoring.labels" . | nindent 4 }}
data:
  system-health.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "title": "hx-auth",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 1 },
          "id": 1,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(rate(hx_auth_http_requests_total[1m]))",
              "legendFormat": "total"
            },
            {
              "expr": "sum(rate(hx_auth_http_requests_total{status_code=~\"5..\"}[1m]))",
              "legendFormat": "5xx"
            }
          ],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true },
              "unit": "s"
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 1 },
          "id": 2,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(hx_auth_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(hx_auth_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(hx_auth_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "title": "Latency",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.01 }, { "color": "red", "value": 0.05 }] },
              "noValue": "0%"
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 11 },
          "id": 3,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" },
          "targets": [
            {
              "expr": "sum(rate(hx_auth_http_requests_total{status_code=~\"5..\"}[5m])) / sum(rate(hx_auth_http_requests_total[5m]))",
              "legendFormat": ""
            }
          ],
          "title": "Error Rate",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 10 }, { "color": "red", "value": 50 }] },
              "noValue": "0"
            }
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 11 },
          "id": 4,
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" },
          "targets": [
            {
              "expr": "hx_auth_http_in_flight",
              "legendFormat": ""
            }
          ],
          "title": "In-Flight",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 },
          "id": 101,
          "title": "hx-tenant-config",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 17 },
          "id": 5,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"hx-tenant-config\"}[1m]))",
              "legendFormat": "total"
            },
            {
              "expr": "sum(rate(http_requests_total{job=\"hx-tenant-config\", status_code=~\"5..\"}[1m]))",
              "legendFormat": "5xx"
            }
          ],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true },
              "unit": "s"
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 17 },
          "id": 6,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"hx-tenant-config\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"hx-tenant-config\"}[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"hx-tenant-config\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "title": "Latency",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 28 },
          "id": 102,
          "title": "hawcx-core-oauth",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 29 },
          "id": 8,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_count{job=\"hawcx-core-oauth\"}[1m]))",
              "legendFormat": "total"
            }
          ],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true },
              "unit": "s"
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 29 },
          "id": 9,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"hawcx-core-oauth\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"hawcx-core-oauth\"}[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"hawcx-core-oauth\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "title": "Latency",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["system-health", "monitoring"],
      "templating": {
        "list": [
          {
            "allValue": ".*",
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(hx_auth_flow_started_total, tenant_id)",
            "includeAll": true,
            "multi": true,
            "name": "tenant_id",
            "query": "label_values(hx_auth_flow_started_total, tenant_id)",
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "System Health",
      "uid": "system-health",
      "version": 6
    }
  session-debug.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "options": { "showTime": true, "sortOrder": "Ascending", "enableLogDetails": true, "dedupStrategy": "none", "wrapLogMessage": true, "prettifyLogMessage": true },
          "targets": [
            {
              "expr": "{app=~\"hx-auth|hx-tenant-config|hawcx-core-oauth\"} |= \"$session_id\" | json",
              "refId": "A"
            }
          ],
          "title": "Session Timeline",
          "description": "All log events for a session across services. Paste a session_id above.",
          "type": "logs"
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 12 },
          "id": 2,
          "options": { "showTime": true, "sortOrder": "Ascending", "enableLogDetails": true, "dedupStrategy": "none", "wrapLogMessage": true, "prettifyLogMessage": true },
          "targets": [
            {
              "expr": "{app=~\"hx-auth|hx-tenant-config|hawcx-core-oauth\"} |= \"$request_id\" | json",
              "refId": "A"
            }
          ],
          "title": "Request Trace",
          "description": "All log events for a single request across services. Paste a request_id above.",
          "type": "logs"
        },
        {
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 24 },
          "id": 3,
          "options": { "showTime": true, "sortOrder": "Descending", "enableLogDetails": true, "dedupStrategy": "none", "wrapLogMessage": true, "prettifyLogMessage": true },
          "targets": [
            {
              "expr": "{app=~\"hx-auth|hx-tenant-config|hawcx-core-oauth\"} | json | level=~\"error|warning\" |= \"$tenant_id\"",
              "refId": "A"
            }
          ],
          "title": "Errors & Warnings",
          "description": "Error and warning logs filtered by tenant. Paste a tenant_id above.",
          "type": "logs"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true },
              "unit": "s"
            }
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 36 },
          "id": 4,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(hx_auth_http_request_duration_seconds_bucket{tenant_id=~\"$tenant_id\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(hx_auth_http_request_duration_seconds_bucket{tenant_id=~\"$tenant_id\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ],
          "title": "Request Latency",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["debugging", "session"],
      "templating": {
        "list": [
          { "current": { "text": "", "value": "" }, "name": "session_id", "type": "textbox", "label": "Session ID" },
          { "current": { "text": "", "value": "" }, "name": "request_id", "type": "textbox", "label": "Request ID" },
          { "current": { "text": "", "value": "" }, "name": "tenant_id", "type": "textbox", "label": "Tenant ID" }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Session Debug",
      "uid": "session-debug",
      "version": 2
    }
  auth-flows.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "thresholds": { "steps": [{ "color": "green", "value": null }] }
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "options": { "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true, "minVizWidth": 16, "minVizHeight": 16, "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            {
              "expr": "sum(hx_auth_flow_started_total{flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}) by (flow_type)",
              "legendFormat": "started {{flow_type}}"
            },
            {
              "expr": "sum(hx_auth_flow_completed_total{flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}) by (flow_type)",
              "legendFormat": "completed {{flow_type}}"
            }
          ],
          "title": "Flow Funnel",
          "type": "bargauge"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "bars", "lineWidth": 1, "fillOpacity": 70, "stacking": { "mode": "normal" } }
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum"] } },
          "targets": [
            {
              "expr": "sum(rate(hx_auth_flow_completed_total{flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}[5m])) by (outcome)",
              "legendFormat": "{{outcome}}"
            }
          ],
          "title": "Flow Outcomes",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true },
              "unit": "s"
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 10 },
          "id": 3,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(hx_auth_flow_duration_seconds_bucket{flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}[5m])) by (le, flow_type))",
              "legendFormat": "p50 {{flow_type}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(hx_auth_flow_duration_seconds_bucket{flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}[5m])) by (le, flow_type))",
              "legendFormat": "p95 {{flow_type}}"
            }
          ],
          "title": "Flow Duration",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 1, "spanNulls": true },
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 0.8 }, { "color": "green", "value": 0.95 }] }
            }
          },
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 10 },
          "id": 4,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] } },
          "targets": [
            {
              "expr": "sum(hx_auth_flow_completed_total{outcome=\"success\", flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}) by (flow_type) / sum(hx_auth_flow_started_total{flow_type=~\"$flow_type\", tenant_id=~\"$tenant_id\"}) by (flow_type)",
              "legendFormat": "{{flow_type}}"
            }
          ],
          "title": "Success Rate",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["auth", "flows"],
      "templating": {
        "list": [
          {
            "allValue": ".*",
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(hx_auth_flow_started_total, flow_type)",
            "includeAll": true,
            "multi": true,
            "name": "flow_type",
            "query": "label_values(hx_auth_flow_started_total, flow_type)",
            "refresh": 2,
            "sort": 1,
            "type": "query"
          },
          {
            "allValue": ".*",
            "current": { "selected": true, "text": "All", "value": "$__all" },
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "definition": "label_values(hx_auth_flow_started_total, tenant_id)",
            "includeAll": true,
            "multi": true,
            "name": "tenant_id",
            "query": "label_values(hx_auth_flow_started_total, tenant_id)",
            "refresh": 2,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Auth Flows",
      "uid": "auth-flows",
      "version": 2
    }
  risk-engine.json: |
