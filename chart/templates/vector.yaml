{{- if .Values.vector.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: {{ .Values.namespace }}
  labels:
    app: kong-log-forwarder
data:
  vector.yaml: |
    sources:
      kong_http_log:
        type: http_server
        address: "0.0.0.0:8080"
        path: "/logs"
        encoding: json

    transforms:
      kong_to_loki:
        type: remap
        inputs: ["kong_http_log"]
        source: |
          .loki_labels = {}
          .loki_labels.job = "kong"
          .loki_labels.service = string(.service.name) ?? "unknown"
          .loki_labels.route = string(.route.name) ?? "unknown"
          .loki_labels.status = string(.response.status) ?? "0"
          .loki_labels.auth_type = string(.auth_type) ?? "unknown"
          .loki_labels.dpop_present = string(.dpop_present) ?? "unknown"
          .loki_labels.tenant_id = string(.tenant_id) ?? "unknown"
          # Auth rejection reason from openid-connect plugin (401s)
          # Extract just the error code, not the full header (Loki labels can't have special chars)
          www_auth, err = string(.response.headers."www-authenticate")
          if err == null && www_auth != "" {
            # Parse: Bearer error="invalid_token" → "invalid_token"
            parsed, parse_err = parse_regex(www_auth, r'error="(?P<error>[^"]+)"')
            if parse_err == null {
              .loki_labels.auth_error = parsed.error
            } else {
              .loki_labels.auth_error = "auth_required"
            }
          } else {
            .loki_labels.auth_error = "none"
          }
          # Rejection reason from post-function (403s)
          reject, err = string(.response.headers."x-kong-reject-reason")
          if err == null && reject != "" {
            .loki_labels.reject_reason = reject
          } else {
            .loki_labels.reject_reason = "none"
          }

    sinks:
      loki:
        type: loki
        inputs: ["kong_to_loki"]
        endpoint: "http://loki-service.{{ .Values.namespace }}.svc.cluster.local:3100"
        labels:
          job: "{{ `{{ loki_labels.job }}` }}"
          service: "{{ `{{ loki_labels.service }}` }}"
          route: "{{ `{{ loki_labels.route }}` }}"
          status: "{{ `{{ loki_labels.status }}` }}"
          auth_type: "{{ `{{ loki_labels.auth_type }}` }}"
          dpop_present: "{{ `{{ loki_labels.dpop_present }}` }}"
          tenant_id: "{{ `{{ loki_labels.tenant_id }}` }}"
          auth_error: "{{ `{{ loki_labels.auth_error }}` }}"
          reject_reason: "{{ `{{ loki_labels.reject_reason }}` }}"
        encoding:
          codec: json
        out_of_order_action: accept
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-log-forwarder
  namespace: {{ .Values.namespace }}
  labels:
    app: kong-log-forwarder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong-log-forwarder
  template:
    metadata:
      labels:
        app: kong-log-forwarder
    spec:
      containers:
        - name: vector
          image: {{ .Values.vector.image | default "timberio/vector:0.41.1-alpine" }}
          args: ["--config", "/etc/vector/vector.yaml"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/vector
          resources:
            requests:
              memory: {{ .Values.vector.resources.requests.memory | default "64Mi" }}
              cpu: {{ .Values.vector.resources.requests.cpu | default "50m" }}
            limits:
              memory: {{ .Values.vector.resources.limits.memory | default "256Mi" }}
              cpu: {{ .Values.vector.resources.limits.cpu | default "200m" }}
      volumes:
        - name: config
          configMap:
            name: vector-config
---
apiVersion: v1
kind: Service
metadata:
  name: kong-log-forwarder
  namespace: {{ .Values.namespace }}
  labels:
    app: kong-log-forwarder
spec:
  selector:
    app: kong-log-forwarder
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
{{- end }}
